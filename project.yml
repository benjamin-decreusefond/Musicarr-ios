# XcodeGen spec — source of truth for the Musicarr Xcode project.
# Regenerate the .xcodeproj with:  xcodegen generate
# (The committed Musicarr.xcodeproj is generated by scripts/generate_xcodeproj.py
#  so the project also opens without XcodeGen installed.)
name: Musicarr
options:
  bundleIdPrefix: ovh.bigbossben.musicarr
  deploymentTarget:
    iOS: "16.0"
    tvOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

targets:
  Musicarr:
    type: application
    platform: iOS
    sources:
      - path: Musicarr
        excludes:
          - "Resources/Info-tvOS.plist"
    settings:
      base:
        INFOPLIST_FILE: Musicarr/Resources/Info-iOS.plist
        PRODUCT_BUNDLE_IDENTIFIER: ovh.bigbossben.musicarr
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"

  Musicarr-tvOS:
    type: application
    platform: tvOS
    sources:
      - path: Musicarr
        excludes:
          - "Resources/Info-iOS.plist"
    settings:
      base:
        INFOPLIST_FILE: Musicarr/Resources/Info-tvOS.plist
        PRODUCT_BUNDLE_IDENTIFIER: ovh.bigbossben.musicarr.tv
        TARGETED_DEVICE_FAMILY: "3"
